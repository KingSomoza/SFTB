<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Start From The Bottom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <!-- Global styles & scripts -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/main.js" defer></script>
    <script src="assets/js/api.js" defer></script>
    <script src="assets/js/auth.js" defer></script>
    <style>
        /* ===== LOGIN PAGE SPECIFIC ===== */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        /* Brand link back to home */
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
            color: var(--star, #f3ead8);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .login-brand:hover {
            opacity: 0.85;
        }
        .login-brand .mark {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--ember-bright), var(--ember) 60%, transparent);
            box-shadow: 0 0 16px var(--ember);
            flex-shrink: 0;
        }

        .login-card {
            background: var(--card-bg, rgba(10, 6, 22, 0.70));
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.10));
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .login-card h1 {
            font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .login-card .sub {
            color: var(--star-dim, #b9ae9a);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .login-card .form-group {
            margin-bottom: 20px;
        }
        .login-card .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--star-dim, #b9ae9a);
            margin-bottom: 6px;
            letter-spacing: 0.04em;
        }
        .login-card .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(10, 6, 22, 0.45);
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.12));
            border-radius: 10px;
            color: var(--star, #f3ead8);
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: var(--font-body, 'Inter', sans-serif);
        }
        .login-card .form-group input:focus {
            border-color: var(--card-border-focus, rgba(224, 179, 85, 0.40));
            box-shadow: 0 0 0 3px rgba(224, 179, 85, 0.10);
        }
        .login-card .form-group input::placeholder {
            color: var(--star-dimmer, #6a5f4e);
        }

        /* Password toggle */
        .password-wrap {
            position: relative;
        }
        .password-wrap input {
            padding-right: 48px;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--star-dim, #b9ae9a);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }
        .password-toggle:hover {
            color: var(--star, #f3ead8);
        }

        .login-card .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--ember-bright), var(--ember));
            color: var(--deep-sky, #0c0820);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: var(--font-body, 'Inter', sans-serif);
        }
        .login-card .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(217, 104, 46, 0.35);
        }
        .login-card .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-card .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.10);
            border: 1px solid rgba(239, 68, 68, 0.20);
            border-radius: 8px;
            display: none;
            text-align: center;
        }
        .login-card .error-msg.visible {
            display: block;
        }

        .login-footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
            font-size: 0.85rem;
        }
        .login-footer-links a {
            color: var(--star-dim, #b9ae9a);
            transition: color 0.2s;
            text-decoration: none;
        }
        .login-footer-links a:hover {
            color: var(--gold, #e0b355);
        }
        .login-footer-links .divider {
            color: var(--star-dimmer, #6a5f4e);
        }

        /* ---- Responsive ---- */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .login-card h1 {
                font-size: 1.4rem;
            }
            .login-brand {
                font-size: 1rem;
            }
            body {
                padding: 16px;
            }
        }

        /* Override body background to keep space visible */
        body {
            background: transparent;
        }
        /* The #universe and canvas are behind everything */
    </style>
</head>
<body>

    <!-- DEEP SPACE + MOON (shared) -->
    <div id="universe"></div>
    <canvas id="stars-canvas"></canvas>
    <div class="moon" aria-hidden="true"></div>

    <!-- ===== LOGIN WRAPPER ===== -->
    <div class="login-wrapper">

        <!-- Brand link back to index -->
        <a href="index.html" class="login-brand">
            <span class="mark"></span>
            START FROM THE BOTTOM
        </a>

        <!-- Login Card -->
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p class="sub">Log in to your guild account</p>

            <form id="loginForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrap">
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        />
                        <button
                            type="button"
                            class="password-toggle"
                            id="passwordToggle"
                            aria-label="Toggle password visibility"
                        >
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Log in</button>

                <div class="error-msg" id="errorMsg">
                    Invalid username or password. Please try again.
                </div>
            </form>

            <div class="login-footer-links">
                <a href="apply.html">Apply for membership</a>
                <span class="divider">·</span>
                <a href="index.html">Back to home</a>
            </div>
        </div>
    </div>

    <!-- ===== PAGE SCRIPT ===== -->
    <script>
        (function() {
            'use strict';

            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const passwordToggle = document.getElementById('passwordToggle');

            // ---- Password toggle ----
            let passwordVisible = false;
            passwordToggle.addEventListener('click', function() {
                passwordVisible = !passwordVisible;
                passwordInput.type = passwordVisible ? 'text' : 'password';
                this.textContent = passwordVisible ? '🙈' : '👁️';
                this.setAttribute('aria-label', passwordVisible ? 'Hide password' : 'Show password');
            });

            // ---- Clear error on input ----
            usernameInput.addEventListener('input', function() {
                errorMsg.classList.remove('visible');
            });
            passwordInput.addEventListener('input', function() {
                errorMsg.classList.remove('visible');
            });

            // ---- Form submit ----
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Reset error
                errorMsg.classList.remove('visible');

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    errorMsg.textContent = 'Please fill in both fields.';
                    errorMsg.classList.add('visible');
                    return;
                }

                // Disable button and show loading state
                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in…';

                try {
                    // Check if auth.js login function is available
                    if (typeof login !== 'function') {
                        throw new Error('Auth module not loaded. Please refresh the page.');
                    }

                    // Attempt login via auth.js (which calls api.js)
                    const result = await login(username, password);

                    if (result.success) {
                        // Login successful — auth.js already stored session
                        // Redirect to roster page
                        window.location.href = 'roster.html';
                    } else {
                        // Show error (generic for security)
                        errorMsg.textContent = 'Invalid username or password. Please try again.';
                        errorMsg.classList.add('visible');
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Log in';
                    }
                } catch (err) {
                    console.error('[Login] Error:', err);
                    errorMsg.textContent = 'An unexpected error occurred. Please try again.';
                    errorMsg.classList.add('visible');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Log in';
                }
            });

            // ---- Check if already logged in ----
            // If user is already authenticated, redirect to roster
            document.addEventListener('DOMContentLoaded', function() {
                if (typeof getCurrentMember === 'function') {
                    const session = getCurrentMember();
                    if (session) {
                        // Already logged in — go to roster
                        window.location.href = 'roster.html';
                    }
                }
            });

        })();
    </script>

</body>
</html>
