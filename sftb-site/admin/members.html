<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Members — SFTB Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <!-- Global styles & scripts -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script src="../assets/js/main.js" defer></script>
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <style>
        /* ===== ADMIN LAYOUT OVERRIDES ===== */
        body {
            display: flex;
            min-height: 100vh;
            background: var(--deep-sky);
        }

        /* Sidebar */
        .admin-sidebar {
            width: 240px;
            background: rgba(10, 6, 22, 0.75);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--card-border, rgba(243, 234, 216, 0.08));
            padding: 24px 20px;
            flex-shrink: 0;
            min-height: 100vh;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .admin-sidebar .brand {
            font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--star, #f3ead8);
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border, rgba(243, 234, 216, 0.06));
        }
        .admin-sidebar .brand .mark {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--ember-bright), var(--ember) 60%, transparent);
            box-shadow: 0 0 12px var(--ember);
        }
        .admin-sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .admin-sidebar nav a {
            padding: 10px 14px;
            border-radius: 8px;
            color: var(--star-dim, #b9ae9a);
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-sidebar nav a:hover {
            background: rgba(224, 179, 85, 0.06);
            color: var(--star, #f3ead8);
        }
        .admin-sidebar nav a.current {
            background: rgba(224, 179, 85, 0.10);
            color: var(--gold, #e0b355);
            border-left: 3px solid var(--gold);
        }
        .admin-sidebar .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--card-border, rgba(243, 234, 216, 0.06));
            font-size: 0.75rem;
            color: var(--star-dimmer, #6a5f4e);
        }
        .admin-sidebar .sidebar-footer a {
            color: var(--star-dim, #b9ae9a);
            display: block;
            padding: 6px 0;
            font-size: 0.8rem;
        }
        .admin-sidebar .sidebar-footer a:hover {
            color: var(--gold, #e0b355);
        }

        /* Main content */
        .admin-main {
            flex: 1;
            padding: 30px 40px 60px;
            min-width: 0;
        }

        .admin-main .page-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .admin-main .page-header h1 {
            font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .admin-main .page-header .sub {
            color: var(--star-dim, #b9ae9a);
            font-size: 0.9rem;
        }

        .admin-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 20px;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border, rgba(243, 234, 216, 0.06));
        }
        .admin-toolbar .search-wrap {
            flex: 1 1 220px;
            min-width: 150px;
            position: relative;
        }
        .admin-toolbar .search-wrap input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: rgba(10, 6, 22, 0.45);
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.12));
            border-radius: 8px;
            color: var(--star, #f3ead8);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .admin-toolbar .search-wrap input:focus {
            border-color: var(--card-border-focus, rgba(224, 179, 85, 0.4));
        }
        .admin-toolbar .search-wrap::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.5;
        }

        /* Table / Cards */
        .table-wrap {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.06));
            background: var(--card-bg, rgba(10, 6, 22, 0.35));
            backdrop-filter: blur(4px);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
            min-width: 700px;
        }
        .admin-table thead {
            background: rgba(10, 6, 22, 0.50);
            border-bottom: 1px solid var(--card-border, rgba(243, 234, 216, 0.06));
        }
        .admin-table th {
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--star-dim, #b9ae9a);
        }
        .admin-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--card-border, rgba(243, 234, 216, 0.04));
            vertical-align: middle;
        }
        .admin-table tbody tr:last-child td {
            border-bottom: none;
        }
        .admin-table tbody tr:hover {
            background: rgba(224, 179, 85, 0.04);
        }

        .admin-table .rank-select {
            padding: 4px 8px;
            background: rgba(10, 6, 22, 0.45);
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.12));
            border-radius: 6px;
            color: var(--star, #f3ead8);
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            font-family: var(--font-body, 'Inter', sans-serif);
        }
        .admin-table .rank-select:focus {
            border-color: var(--card-border-focus, rgba(224, 179, 85, 0.4));
        }
        .admin-table .action-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .admin-table .action-btns button {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 6px;
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.10));
            background: rgba(10, 6, 22, 0.35);
            color: var(--star-dim, #b9ae9a);
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-body, 'Inter', sans-serif);
        }
        .admin-table .action-btns button:hover {
            border-color: var(--gold, #e0b355);
            color: var(--star, #f3ead8);
        }
        .admin-table .action-btns .btn-remove {
            color: #ef4444;
        }
        .admin-table .action-btns .btn-remove:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Mobile cards */
        .member-cards {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .member-card {
            background: var(--card-bg, rgba(10, 6, 22, 0.50));
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.06));
            border-radius: 12px;
            padding: 18px 20px;
        }
        .member-card .card-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .member-card .card-row .name {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .member-card .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 0.85rem;
            color: var(--star-dim, #b9ae9a);
            margin: 8px 0;
        }
        .member-card .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.70);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--card-bg, rgba(10, 6, 22, 0.92));
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.12));
            border-radius: 20px;
            padding: 36px 32px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
            font-size: 1.4rem;
            margin-bottom: 6px;
        }
        .modal .modal-sub {
            color: var(--star-dim, #b9ae9a);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .modal .form-group {
            margin-bottom: 18px;
        }
        .modal .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--star-dim, #b9ae9a);
            margin-bottom: 4px;
        }
        .modal .form-group input,
        .modal .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(10, 6, 22, 0.45);
            border: 1px solid var(--card-border, rgba(243, 234, 216, 0.12));
            border-radius: 8px;
            color: var(--star, #f3ead8);
            font-size: 0.9rem;
            outline: none;
            font-family: var(--font-body, 'Inter', sans-serif);
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus {
            border-color: var(--card-border-focus, rgba(224, 179, 85, 0.4));
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal .modal-actions button {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: var(--font-body, 'Inter', sans-serif);
        }
        .modal .modal-actions .btn-cancel {
            background: rgba(243, 234, 216, 0.08);
            color: var(--star-dim, #b9ae9a);
        }
        .modal .modal-actions .btn-cancel:hover {
            background: rgba(243, 234, 216, 0.14);
        }
        .modal .modal-actions .btn-confirm {
            background: linear-gradient(135deg, var(--ember-bright), var(--ember));
            color: var(--deep-sky, #0c0820);
        }
        .modal .modal-actions .btn-confirm:hover {
            box-shadow: 0 4px 16px rgba(217, 104, 46, 0.3);
        }
        .modal .modal-actions .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .modal .modal-actions .btn-danger:hover {
            background: #dc2626;
        }

        /* Loading / empty states */
        .loading-state, .empty-state, .error-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--star-dim, #b9ae9a);
        }
        .loading-state .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(243, 234, 216, 0.10);
            border-top-color: var(--gold, #e0b355);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { margin-top: 12px; }

        /* Responsive */
        @media (max-width: 920px) {
            .admin-sidebar {
                width: 64px;
                padding: 16px 10px;
            }
            .admin-sidebar .brand span:not(.mark) { display: none; }
            .admin-sidebar .brand { justify-content: center; }
            .admin-sidebar nav a span { display: none; }
            .admin-sidebar nav a { justify-content: center; padding: 10px; }
            .admin-sidebar .sidebar-footer { display: none; }
            .admin-main { padding: 20px 16px; }
        }

        @media (max-width: 700px) {
            .table-wrap { display: none; }
            .member-cards { display: flex; }
            .admin-main .page-header h1 { font-size: 1.4rem; }
            .admin-toolbar { flex-direction: column; align-items: stretch; }
            .modal { padding: 24px 18px; }
        }

        @media (max-width: 480px) {
            .admin-sidebar { width: 52px; padding: 12px 6px; }
            .admin-main { padding: 16px 12px; }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="admin-sidebar">
        <div class="brand">
            <span class="mark"></span>
            <span>SFTB</span>
        </div>
        <nav>
            <a href="index.html">📊 Dashboard</a>
            <a href="members.html" class="current">👥 Members</a>
            <a href="applications.html">📋 Applications</a>
            <a href="settings.html">⚙️ Settings</a>
        </nav>
        <div class="sidebar-footer">
            <a href="../index.html">← Back to site</a>
            <a href="#" id="adminLogout">Logout</a>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">

        <!-- Page header -->
        <div class="page-header">
            <div>
                <h1>Manage Members</h1>
                <div class="sub">View, edit, promote, or remove guild members.</div>
            </div>
            <button class="btn btn-primary" id="addMemberBtn">+ Add Member</button>
        </div>

        <!-- Toolbar -->
        <div class="admin-toolbar">
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Search by name..." />
            </div>
            <div style="font-size:0.8rem; color:var(--star-dim);">
                <span id="memberCount">0</span> members
            </div>
        </div>

        <!-- TABLE (desktop) -->
        <div class="table-wrap" id="tableWrap">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>Rank</th>
                        <th>Level</th>
                        <th>Joined</th>
                        <th>Last Active</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="membersBody">
                    <!-- dynamic -->
                </tbody>
            </table>
        </div>

        <!-- CARDS (mobile) -->
        <div class="member-cards" id="memberCards">
            <!-- dynamic -->
        </div>

        <!-- Loading / empty / error -->
        <div id="stateContainer" class="loading-state">
            <div class="spinner"></div>
            <p>Loading members…</p>
        </div>

    </main>

    <!-- ===== MODAL (Add / Edit) ===== -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal">
            <h2 id="modalTitle">Add Member</h2>
            <p class="modal-sub" id="modalSub">Fill in the details below.</p>
            <form id="memberForm" autocomplete="off">
                <input type="hidden" id="editMemberId" />
                <div class="form-group">
                    <label for="modalName">Name</label>
                    <input type="text" id="modalName" placeholder="In-game name" required />
                </div>
                <div class="form-group">
                    <label for="modalLevel">Level</label>
                    <input type="number" id="modalLevel" placeholder="Current level" required min="1" />
                </div>
                <div class="form-group">
                    <label for="modalRank">Rank</label>
                    <select id="modalRank">
                        <option value="Recruit">Recruit</option>
                        <option value="Digger">Digger</option>
                        <option value="Miner">Miner</option>
                        <option value="Prospector">Prospector</option>
                        <option value="Voyager">Voyager</option>
                        <option value="Starbound">Starbound</option>
                    </select>
                </div>
                <div class="form-group" id="modalJoinedGroup">
                    <label for="modalJoined">Joined Date</label>
                    <input type="date" id="modalJoined" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="modalCancel">Cancel</button>
                    <button type="submit" class="btn-confirm" id="modalSubmit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== PAGE SCRIPT ===== -->
    <script>
        (function() {
            'use strict';

            // ---- Auth guard ----
            if (typeof checkAdminAuth === 'function') {
                const session = checkAdminAuth(true);
                if (!session) return; // will redirect
            } else {
                console.warn('auth.js not loaded, skipping admin check');
            }

            // ---- DOM refs ----
            const tbody = document.getElementById('membersBody');
            const cardsContainer = document.getElementById('memberCards');
            const stateContainer = document.getElementById('stateContainer');
            const searchInput = document.getElementById('searchInput');
            const memberCount = document.getElementById('memberCount');

            const addBtn = document.getElementById('addMemberBtn');
            const modal = document.getElementById('memberModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalSub = document.getElementById('modalSub');
            const memberForm = document.getElementById('memberForm');
            const editId = document.getElementById('editMemberId');
            const modalName = document.getElementById('modalName');
            const modalLevel = document.getElementById('modalLevel');
            const modalRank = document.getElementById('modalRank');
            const modalJoined = document.getElementById('modalJoined');
            const modalJoinedGroup = document.getElementById('modalJoinedGroup');
            const modalCancel = document.getElementById('modalCancel');
            const modalSubmit = document.getElementById('modalSubmit');

            const logoutBtn = document.getElementById('adminLogout');

            let allMembers = [];
            let currentFilter = '';

            // ---- helpers ----
            function formatDate(dateStr) {
                if (!dateStr) return '—';
                try {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                } catch { return dateStr; }
            }

            function getRankClass(rank) {
                if (!rank) return '';
                const r = rank.toLowerCase();
                if (r.includes('recruit')) return 'recruit';
                if (r.includes('digger')) return 'digger';
                if (r.includes('miner')) return 'miner';
                if (r.includes('prospector')) return 'prospector';
                if (r.includes('voyager')) return 'voyager';
                if (r.includes('starbound')) return 'starbound';
                return '';
            }

            function renderMembers(members) {
                const filtered = members.filter(m => {
                    const name = (m.name || m.ign || m.username || '').toLowerCase();
                    return name.includes(currentFilter.toLowerCase());
                });

                memberCount.textContent = filtered.length;

                if (filtered.length === 0) {
                    stateContainer.innerHTML = `<div class="empty-state"><p>✨ No members found.</p></div>`;
                    stateContainer.style.display = 'block';
                    tbody.parentElement.style.display = 'none';
                    cardsContainer.style.display = 'none';
                    return;
                }

                stateContainer.style.display = 'none';
                tbody.parentElement.style.display = '';
                cardsContainer.style.display = 'flex';

                let tableHtml = '';
                let cardsHtml = '';

                filtered.forEach(m => {
                    const id = m.id || m.memberId || m.username || 'unknown';
                    const name = m.name || m.ign || m.username || 'Unknown';
                    const rank = m.rank || 'Recruit';
                    const level = m.level || m.Level || '—';
                    const joined = m.joined || m.joinedDate || m.createdAt || '';
                    const lastActive = m.lastActive || m.lastActivity || m.updatedAt || '';
                    const rankClass = getRankClass(rank);

                    // Table row
                    tableHtml += `
                        <tr data-id="${id}">
                            <td><strong>${name}</strong></td>
                            <td>
                                <select class="rank-select" data-id="${id}" data-field="rank">
                                    <option value="Recruit" ${rank === 'Recruit' ? 'selected' : ''}>Recruit</option>
                                    <option value="Digger" ${rank === 'Digger' ? 'selected' : ''}>Digger</option>
                                    <option value="Miner" ${rank === 'Miner' ? 'selected' : ''}>Miner</option>
                                    <option value="Prospector" ${rank === 'Prospector' ? 'selected' : ''}>Prospector</option>
                                    <option value="Voyager" ${rank === 'Voyager' ? 'selected' : ''}>Voyager</option>
                                    <option value="Starbound" ${rank === 'Starbound' ? 'selected' : ''}>Starbound</option>
                                </select>
                            </td>
                            <td>${level}</td>
                            <td>${formatDate(joined)}</td>
                            <td>${formatDate(lastActive)}</td>
                            <td style="text-align:right;">
                                <div class="action-btns">
                                    <button class="btn-edit" data-id="${id}">✎ Edit</button>
                                    <button class="btn-remove" data-id="${id}">✕ Remove</button>
                                </div>
                            </td>
                        </tr>
                    `;

                    // Card
                    cardsHtml += `
                        <div class="member-card" data-id="${id}">
                            <div class="card-row">
                                <span class="name">${name}</span>
                                <select class="rank-select" data-id="${id}" data-field="rank">
                                    <option value="Recruit" ${rank === 'Recruit' ? 'selected' : ''}>Recruit</option>
                                    <option value="Digger" ${rank === 'Digger' ? 'selected' : ''}>Digger</option>
                                    <option value="Miner" ${rank === 'Miner' ? 'selected' : ''}>Miner</option>
                                    <option value="Prospector" ${rank === 'Prospector' ? 'selected' : ''}>Prospector</option>
                                    <option value="Voyager" ${rank === 'Voyager' ? 'selected' : ''}>Voyager</option>
                                    <option value="Starbound" ${rank === 'Starbound' ? 'selected' : ''}>Starbound</option>
                                </select>
                            </div>
                            <div class="card-meta">
                                <span>⚔️ Level ${level}</span>
                                <span>📅 ${formatDate(joined)}</span>
                                <span>🕒 ${formatDate(lastActive)}</span>
                            </div>
                            <div class="card-actions">
                                <button class="btn-edit" data-id="${id}">✎ Edit</button>
                                <button class="btn-remove" data-id="${id}">✕ Remove</button>
                            </div>
                        </div>
                    `;
                });

                tbody.innerHTML = tableHtml;
                cardsContainer.innerHTML = cardsHtml;

                // Attach events to dynamic elements
                document.querySelectorAll('.rank-select').forEach(sel => {
                    sel.addEventListener('change', function(e) {
                        const id = this.dataset.id;
                        const newRank = this.value;
                        handleRankChange(id, newRank);
                    });
                });

                document.querySelectorAll('.btn-edit').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        openEditModal(id);
                    });
                });

                document.querySelectorAll('.btn-remove').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = this.dataset.id;
                        handleRemove(id);
                    });
                });
            }

            // ---- CRUD operations ----
            async function handleRankChange(memberId, newRank) {
                try {
                    if (typeof updateMemberRank !== 'function') {
                        throw new Error('updateMemberRank() not available');
                    }
                    const result = await updateMemberRank(memberId, newRank, 'Admin update');
                    if (result.success) {
                        if (typeof showToast === 'function') {
                            showToast('Rank updated successfully!', 'success');
                        }
                        // Update local data
                        const member = allMembers.find(m => (m.id || m.memberId || m.username) === memberId);
                        if (member) member.rank = newRank;
                        renderMembers(allMembers);
                    } else {
                        throw new Error(result.error || 'Failed to update rank');
                    }
                } catch (err) {
                    console.error('[Rank Change]', err);
                    if (typeof showToast === 'function') {
                        showToast('Error updating rank: ' + err.message, 'error');
                    }
                    // Revert select visually by re-rendering
                    renderMembers(allMembers);
                }
            }

            async function handleRemove(memberId) {
                const member = allMembers.find(m => (m.id || m.memberId || m.username) === memberId);
                const name = member ? (member.name || member.ign || 'this member') : 'this member';
                if (!confirm(`Are you sure you want to remove "${name}" from the guild? This action cannot be undone.`)) {
                    return;
                }

                try {
                    // API call to remove member
                    let result;
                    if (typeof removeMember === 'function') {
                        result = await removeMember(memberId);
                    } else {
                        // Fallback: try to use apiPost directly
                        if (typeof apiPost === 'function') {
                            result = await apiPost('removeMember', { memberId });
                        } else {
                            throw new Error('removeMember() not available');
                        }
                    }

                    if (result.success) {
                        if (typeof showToast === 'function') {
                            showToast('Member removed successfully.', 'success');
                        }
                        allMembers = allMembers.filter(m => (m.id || m.memberId || m.username) !== memberId);
                        renderMembers(allMembers);
                    } else {
                        throw new Error(result.error || 'Failed to remove member');
                    }
                } catch (err) {
                    console.error('[Remove]', err);
                    if (typeof showToast === 'function') {
                        showToast('Error removing member: ' + err.message, 'error');
                    }
                }
            }

            function openEditModal(memberId) {
                const member = allMembers.find(m => (m.id || m.memberId || m.username) === memberId);
                if (!member) return;

                modalTitle.textContent = 'Edit Member';
                modalSub.textContent = 'Update member details.';
                editId.value = memberId;
                modalName.value = member.name || member.ign || '';
                modalLevel.value = member.level || member.Level || '';
                modalRank.value = member.rank || 'Recruit';
                modalJoined.value = member.joined ? member.joined.split('T')[0] : '';
                modalJoinedGroup.style.display = 'block';
                modalSubmit.textContent = 'Update';
                modal.classList.add('active');
            }

            function openAddModal() {
                modalTitle.textContent = 'Add Member';
                modalSub.textContent = 'Add a new member to the guild.';
                editId.value = '';
                modalName.value = '';
                modalLevel.value = '';
                modalRank.value = 'Recruit';
                modalJoined.value = new Date().toISOString().split('T')[0];
                modalJoinedGroup.style.display = 'block';
                modalSubmit.textContent = 'Add';
                modal.classList.add('active');
            }

            function closeModal() {
                modal.classList.remove('active');
                memberForm.reset();
                editId.value = '';
            }

            // ---- Form submit ----
            memberForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const id = editId.value;
                const name = modalName.value.trim();
                const level = modalLevel.value.trim();
                const rank = modalRank.value;
                const joined = modalJoined.value;

                if (!name || !level) {
                    if (typeof showToast === 'function') {
                        showToast('Name and level are required.', 'warning');
                    }
                    return;
                }

                const payload = {
                    name,
                    level: parseInt(level, 10),
                    rank,
                    joined: joined || new Date().toISOString()
                };

                try {
                    let result;
                    if (id) {
                        // Edit existing
                        payload.memberId = id;
                        if (typeof updateMember === 'function') {
                            result = await updateMember(id, payload);
                        } else if (typeof apiPost === 'function') {
                            result = await apiPost('updateMember', { memberId: id, ...payload });
                        } else {
                            throw new Error('updateMember() not available');
                        }
                    } else {
                        // Add new
                        if (typeof addMember === 'function') {
                            result = await addMember(payload);
                        } else if (typeof apiPost === 'function') {
                            result = await apiPost('addMember', payload);
                        } else {
                            throw new Error('addMember() not available');
                        }
                    }

                    if (result.success) {
                        if (typeof showToast === 'function') {
                            showToast(id ? 'Member updated!' : 'Member added!', 'success');
                        }
                        closeModal();
                        await loadMembers(); // reload
                    } else {
                        throw new Error(result.error || 'Operation failed');
                    }
                } catch (err) {
                    console.error('[Member Save]', err);
                    if (typeof showToast === 'function') {
                        showToast('Error: ' + err.message, 'error');
                    }
                }
            });

            // ---- Load members ----
            async function loadMembers() {
                try {
                    stateContainer.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading members…</p></div>`;
                    stateContainer.style.display = 'block';
                    tbody.parentElement.style.display = 'none';
                    cardsContainer.style.display = 'none';

                    if (typeof getMembers !== 'function') {
                        throw new Error('getMembers() not available');
                    }
                    const res = await getMembers({ limit: 500 });
                    if (res.success && res.members) {
                        allMembers = res.members;
                        renderMembers(allMembers);
                    } else {
                        throw new Error(res.error || 'Failed to load members');
                    }
                } catch (err) {
                    console.error('[Load Members]', err);
                    stateContainer.innerHTML = `
                        <div class="error-state">
                            <p style="font-size:1.1rem;">⚠️ Could not load members</p>
                            <p style="font-size:0.85rem; opacity:0.7;">${err.message}</p>
                        </div>
                    `;
                    stateContainer.style.display = 'block';
                }
            }

            // ---- Event listeners ----
            searchInput.addEventListener('input', function() {
                currentFilter = this.value;
                renderMembers(allMembers);
            });

            addBtn.addEventListener('click', openAddModal);
            modalCancel.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // Logout
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async function(e) {
                    e.preventDefault();
                    if (typeof logout === 'function') {
                        await logout(true);
                    } else {
                        window.location.href = '../index.html';
                    }
                });
            }

            // ---- Init ----
            document.addEventListener('DOMContentLoaded', loadMembers);

        })();
    </script>

</body>
</html>
